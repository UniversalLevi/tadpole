apiVersion: apps/v1
kind: Deployment
metadata:
  name: tadpole-worker-settlement
  labels:
    app: tadpole-worker-settlement
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tadpole-worker-settlement
  template:
    metadata:
      labels:
        app: tadpole-worker-settlement
    spec:
      containers:
        - name: worker
          image: tadpole-api:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "dist/workers/settlementWorker.js"]
          envFrom:
            - configMapRef:
                name: tadpole-config
            - secretRef:
                name: tadpole-secrets
                optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
