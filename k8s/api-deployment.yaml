# Tadpole API Deployment. Assumes image is built and pushed (e.g. tadpole-api:latest).
# MongoDB and Redis are external (managed or separate deployments).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tadpole-api
  labels:
    app: tadpole-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: tadpole-api
  template:
    metadata:
      labels:
        app: tadpole-api
    spec:
      containers:
        - name: api
          image: tadpole-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: tadpole-config
            - secretRef:
                name: tadpole-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: tadpole-api
spec:
  selector:
    app: tadpole-api
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP
