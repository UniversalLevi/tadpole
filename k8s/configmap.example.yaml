# Example ConfigMap. Copy to configmap.yaml and set values.
# MongoDB and Redis are assumed to be reachable (e.g. tadpole-mongo:27017, tadpole-redis:6379).
apiVersion: v1
kind: ConfigMap
metadata:
  name: tadpole-config
data:
  NODE_ENV: "production"
  PORT: "5000"
  MONGODB_URI: "mongodb://mongo:27017/tadpole"
  REDIS_URL: "redis://redis:6379"
  FRONTEND_ORIGIN: "https://your-frontend.example.com"
  # Optional: MIN_BET_AMOUNT, MAX_BET_AMOUNT, ROUND_DURATION_MS, etc.
